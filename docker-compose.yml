version: '3.8'

services:
  database:
    image: postgres:17
    container_name: postgres_contenedor
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=tu_password_aqui  
      - POSTGRES_DB=postgres
    ports:
      - "5433:5432" 
    volumes:
      - ./backup_proyecto.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - arandanos-network

  # MongoDB para datos de sensores
  mongodb:
    image: mongo:7.0
    container_name: mongodb-arandanos
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: Panconpalta1
      MONGO_INITDB_DATABASE: Arandanos
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - arandanos-network

volumes:
  postgres_data:
  mongodb_data:

networks:
  arandanos-network:
    driver: bridge